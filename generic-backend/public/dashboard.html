<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PostgreSQL User Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #22d3ee;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
            background-image: radial-gradient(circle at 50% 0%, #1e1b4b 0%, var(--bg) 70%);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #818cf8, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-dim);
            font-size: 1.1rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card h3 {
            color: var(--text-dim);
            font-size: 0.9rem;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
        }

        .table-container {
            background: var(--card-bg);
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            overflow: hidden;
            animation: fadeInUp 0.8s ease-out;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem;
            color: var(--text-dim);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            font-size: 0.95rem;
        }

        tr:hover td {
            background: rgba(99, 102, 241, 0.1);
        }

        .user-id {
            font-family: monospace;
            color: var(--text-dim);
            font-size: 0.8rem;
        }

        .user-name {
            font-weight: 600;
            color: var(--accent);
        }

        .user-date {
            color: var(--text-dim);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loader {
            text-align: center;
            padding: 5rem;
            color: var(--text-dim);
            font-size: 1.5rem;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>PostgreSQL User Table</h1>
            <p class="subtitle">Direct Database Visualization</p>
        </header>

        <div id="loader" class="loader">Fetching records...</div>

        <div id="content" class="hidden">
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Synchronized Users</h3>
                    <div id="total-users" class="value">0</div>
                </div>
                <div class="stat-card">
                    <h3>Database Status</h3>
                    <div class="value" style="color: #4ade80;">ONLINE</div>
                </div>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>User Name</th>
                            <th>Email Address</th>
                            <th>Record ID</th>
                            <th>Date Joined</th>
                        </tr>
                    </thead>
                    <tbody id="user-table-body">
                        <!-- Table rows will appear here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function fetchData() {
            try {
                const response = await fetch('/api/v1/users');
                const result = await response.json();
                const users = result.data.users;

                document.getElementById('loader').classList.add('hidden');
                document.getElementById('content').classList.remove('hidden');
                document.getElementById('total-users').innerText = users.length;

                const tableBody = document.getElementById('user-table-body');
                users.forEach((user) => {
                    const row = document.createElement('tr');

                    row.innerHTML = `
                        <td><span class="user-name">${user.full_name || 'Anonymous'}</span></td>
                        <td>${user.email}</td>
                        <td class="user-id">${user.id.substring(0, 18)}...</td>
                        <td class="user-date">${new Date(user.created_at).toLocaleDateString()}</td>
                    `;
                    tableBody.appendChild(row);
                });

            } catch (err) {
                console.error('Error fetching data:', err);
                document.getElementById('loader').innerText = 'Failed to load data. Is the server running?';
            }
        }

        fetchData();
    </script>
</body>

</html>
