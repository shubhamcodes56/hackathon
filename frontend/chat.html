<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusFlow Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/chat.css">
</head>
<body>
  <div class="bg-grid"></div>

  <nav class="topbar">
    <div class="top-left">
      <a href="/dashboard" class="brand">
        <span class="brand-icon">C</span>
        <span class="brand-text">CAMPUSFLOW CHAT</span>
      </a>
      <div class="quick-nav">
        <a href="/dashboard#signals">Signals</a>
        <a href="/dashboard#alerts">Alerts</a>
        <a href="/dashboard#density">Density</a>
        <a href="/dashboard#spaces">Spaces</a>
        <a href="/chat" class="active">Chat</a>
      </div>
    </div>
    <div class="top-actions">
      <a href="/dashboard" class="btn ghost"><i class="fas fa-arrow-left"></i> Dashboard</a>
    </div>
  </nav>

  <main class="layout">
    <aside class="panel settings">
      <h2><i class="fas fa-key"></i> LLM Setup</h2>
      <p class="hint">Save your API key once. Models load from your provider automatically.</p>

      <label for="apiKey">API Key</label>
      <input id="apiKey" type="password" placeholder="Paste OpenAI or Gemini key">

      <div class="row">
        <button id="saveKeyBtn" class="btn primary">Save Key</button>
        <button id="clearKeyBtn" class="btn warn">Clear</button>
      </div>

      <label for="modelSelect">Model</label>
      <select id="modelSelect" disabled>
        <option>Save key first</option>
      </select>

      <p id="keyStatus" class="status">No API key saved.</p>
    </aside>

    <section class="panel chatbox">
      <header class="chat-head">
        <h1>Campus Assistant</h1>
        <p>Ask about classrooms, parking, routes, and real-time campus context.</p>
      </header>

      <div id="messages" class="messages"></div>

      <form id="chatForm" class="composer">
        <input id="questionInput" type="text" placeholder="Ask your campus question..." autocomplete="off">
        <button type="submit" id="sendBtn" class="btn primary"><i class="fas fa-paper-plane"></i> Send</button>
      </form>
    </section>
  </main>

  <script src="js/chat.js"></script>
</body>
</html>
