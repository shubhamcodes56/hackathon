version: '3.8'
services:
  db:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_DB: visionx
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - visionx_db_data:/var/lib/postgresql/data

  app:
    build: .
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/visionx
      - PORT=4000
    ports:
      - "4000:4000"
    depends_on:
      - db

volumes:
  visionx_db_data:
